    <script>
        // Player variables and game initialization code here

        function endGame(success) {
            // End game logic here
            if (success) {
                // Proceed to end game
            }
        }
        
        function fetchLeaderboard() {
            const BIN_ID = 'YOUR_BIN_ID'; // Replace with actual BIN_ID
            const ACCESS_KEY = 'YOUR_ACCESS_KEY'; // Replace with actual ACCESS_KEY
            
            if (!BIN_ID || !ACCESS_KEY) {
                // Handle error and use localStorage
                alert('Configuration missing. Using localStorage only.');
                return;
            }
            
            fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'GET',
                headers: {
                    'secret-key': ACCESS_KEY,
                },
            })
            .then(response => response.json())
            .then(data => {
                // Handle fetched data
                // Merge list logic
                fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'secret-key': ACCESS_KEY,
                    },
                    body: JSON.stringify(data),
                });
            })
            .catch(error => {
                console.error('Error fetching leaderboard:', error);
                // Implement clearer error handling here
            });
        }

        // Call this function at appropriate events
        function saveAndRestart() {
            // Implementation of save and restart logic
            fetchLeaderboard();
        }

        // Ensure to call endGame with updated scores before comparison
        function showScores() {
            // Show scores implementation
            fetchLeaderboard();
        }
    </script>
